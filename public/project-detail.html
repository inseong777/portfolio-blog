<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 상세</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">홈</a>
    <ul class="nav-links">
      <li><a href="/">About</a></li>
      <li><a href="/experience.html">경력</a></li>
      <li><a href="/projects.html" class="active">프로젝트</a></li>
      <li><a href="/blog/">블로그</a></li>
    </ul>
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">☀</button>
  </div>
</nav>

<main class="page">
  <div id="detail-container">
    <div class="loading">불러오는 중…</div>
  </div>
</main>

<footer>Built with Node.js &amp; Vanilla JS</footer>

<script src="/js/main.js"></script>
<script>
  async function init() {
    const id = new URLSearchParams(location.search).get('id');
    const container = document.getElementById('detail-container');

    if (!id) {
      container.innerHTML = '<div class="empty-state"><p>프로젝트를 찾을 수 없습니다.</p><br><a href="/projects.html">← 목록으로</a></div>';
      return;
    }

    try {
      const projects = await fetchJSON('/api/projects');
      const p = projects.find(proj => String(proj.id) === String(id));
      if (!p) throw new Error('not found');
      document.title = p.title + ' — 프로젝트';

      container.innerHTML = `
        <a href="/projects.html" class="project-detail-back">← 프로젝트 목록으로</a>

        <div class="project-detail-header">
          <h1 class="project-detail-title">${esc(p.title)}</h1>
          <p class="project-detail-date">${esc(p.date)}</p>
        </div>

        <p class="project-detail-section-label">프로젝트 설명</p>
        <div class="project-detail-desc">${esc(p.description)}</div>

        <p class="project-detail-section-label">사용 기술</p>
        <div class="project-detail-tags">
          ${(p.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}
        </div>

        ${(p.github || p.demo) ? `
          <p class="project-detail-section-label">링크</p>
          <div class="project-detail-links">
            ${p.github ? `<a class="btn btn-outline btn-sm" href="${esc(p.github)}" target="_blank" rel="noopener">GitHub →</a>` : ''}
            ${p.demo ? `<a class="btn btn-outline btn-sm" href="${esc(p.demo)}" target="_blank" rel="noopener">Demo →</a>` : ''}
          </div>
        ` : ''}
      `;
    } catch {
      container.innerHTML = '<div class="empty-state"><p>프로젝트를 불러올 수 없습니다.</p><br><a href="/projects.html">← 목록으로</a></div>';
    }
  }
  init();
</script>
</body>
</html>
