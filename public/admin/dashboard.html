<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">← 사이트</a>
    <ul class="nav-links">
      <li><a href="/admin/dashboard.html" class="active">대시보드</a></li>
      <li><a href="/admin/editor.html">새 글 작성</a></li>
      <li><a href="#" id="logout-btn">로그아웃</a></li>
    </ul>
  </div>
</nav>

<main class="page">
  <div class="admin-header">
    <h1 style="font-size:1.4rem; font-weight:700;">대시보드</h1>
  </div>

  <!-- Posts section -->
  <section style="margin-bottom:56px;">
    <div class="admin-header">
      <h2 class="section-title" style="margin-bottom:0;">블로그 글</h2>
      <a href="/admin/editor.html" class="btn btn-primary btn-sm">+ 새 글</a>
    </div>
    <div id="posts-wrap">
      <div class="loading">불러오는 중…</div>
    </div>
  </section>

  <!-- Projects section -->
  <section>
    <div class="admin-header">
      <h2 class="section-title" style="margin-bottom:0;">프로젝트</h2>
      <button class="btn btn-primary btn-sm" id="add-project-btn">+ 프로젝트 추가</button>
    </div>
    <div id="projects-wrap">
      <div class="loading">불러오는 중…</div>
    </div>
  </section>
</main>

<!-- Project modal -->
<div id="project-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; align-items:center; justify-content:center;">
  <div style="background:var(--bg); border-radius:var(--radius); padding:32px; width:100%; max-width:500px; margin:16px; max-height:90vh; overflow-y:auto;">
    <h2 style="font-size:1.1rem; font-weight:700; margin-bottom:20px;" id="modal-title">프로젝트 추가</h2>
    <div id="modal-alert"></div>
    <form id="project-form">
      <input type="hidden" id="project-id" />
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="p-title" required />
      </div>
      <div class="form-group">
        <label>설명</label>
        <textarea id="p-desc" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>기술 스택 (쉼표로 구분)</label>
        <input type="text" id="p-tags" placeholder="Node.js, Express, MySQL" />
      </div>
      <div class="form-group">
        <label>GitHub URL</label>
        <input type="text" id="p-github" />
      </div>
      <div class="form-group">
        <label>Demo URL</label>
        <input type="text" id="p-demo" />
      </div>
      <div class="form-group">
        <label>날짜</label>
        <input type="date" id="p-date" />
      </div>
      <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:24px;">
        <button type="button" class="btn btn-outline" id="modal-cancel">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/main.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
